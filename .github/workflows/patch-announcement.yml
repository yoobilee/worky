name: Patch Announcement

on:
  push:
    tags:
      - 'v*'

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse CHANGELOG and create announcement
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # 태그명 추출 (예: v1.1.2)
          TAG=${GITHUB_REF#refs/tags/}

          # CHANGELOG.md에서 해당 버전 내용 파싱
          # ## [v1.1.2] 섹션부터 다음 ## 섹션 전까지 추출
          CONTENT=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md | sed '/^$/d' | head -20 | tr '\n' ' ' | sed 's/### //g' | sed 's/\*\*//g' | sed 's/- /• /g')

          TITLE="${TAG} 업데이트"

          # jq로 안전하게 JSON 생성 (따옴표, 백슬래시 등 특수문자 자동 이스케이프)
          PAYLOAD=$(jq -n --arg title "$TITLE" --arg content "$CONTENT" \
            '{title: $title, content: $content, type: "patch", is_active: true}')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${SUPABASE_URL}/rest/v1/announcements" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Announcement 생성 실패 (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi

          echo "Announcement created for ${TAG}"
